  <!-- ═══ LIGHTBOX ═══ -->

  <script src="/assets/js/main.js" type="module"></script>

  <script>
  /* ── Gallery Filter ── */
  const filterBtns = document.querySelectorAll('.filter-btn');
  const galleryItems = document.querySelectorAll('.gallery-item');
  const emptyMsg = document.getElementById('gallery-empty');

  function applyMasonryTall() {
    const visible = [...galleryItems].filter(item => !item.hidden);
    visible.forEach((item, i) => {
      item.classList.toggle('gallery-item--tall', i % 3 === 0);
    });
  }

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');

      const filter = btn.dataset.filter;
      let visibleCount = 0;

      galleryItems.forEach(item => {
        const show = filter === 'all' || item.dataset.category === filter;
        item.hidden = !show;
        if (show) visibleCount++;
      });

      applyMasonryTall();
      emptyMsg.hidden = visibleCount > 0;
    });
  });

  // Apply initial tall classes on page load
  applyMasonryTall();

  /* ── Lightbox ── */
  const lightbox     = document.getElementById('lightbox');
  const lightboxImg  = document.getElementById('lightbox-img');
  const lightboxCap  = document.getElementById('lightbox-caption');
  const btnClose     = document.getElementById('lightbox-close');
  const btnPrev      = document.getElementById('lightbox-prev');
  const btnNext      = document.getElementById('lightbox-next');

  let currentIndex = 0;

  function getVisibleItems() {
    return [...galleryItems].filter(item => !item.hidden);
  }

  function openLightbox(index) {
    const visible = getVisibleItems();
    if (!visible[index]) return;
    currentIndex = index;

    const img = visible[index].querySelector('img');
    const cap = visible[index].querySelector('.gallery-item__caption');

    lightboxImg.src = img.src;
    lightboxImg.alt = img.alt;
    lightboxCap.textContent = cap ? cap.textContent.trim() : '';

    lightbox.classList.add('open');
    lightbox.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';

    // Focus close button
    btnClose.focus();
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    lightbox.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }

  function navigate(dir) {
    const visible = getVisibleItems();
    currentIndex = (currentIndex + dir + visible.length) % visible.length;
    openLightbox(currentIndex);
  }

  // Open on gallery item click
  galleryItems.forEach((item, i) => {
    item.querySelector('.gallery-item__btn').addEventListener('click', () => {
      const visible = getVisibleItems();
      const visibleIndex = visible.indexOf(item);
      openLightbox(visibleIndex);
    });
  });

  btnClose.addEventListener('click', closeLightbox);
  btnPrev.addEventListener('click', () => navigate(-1));
  btnNext.addEventListener('click', () => navigate(1));

  // Close on overlay click
  lightbox.addEventListener('click', e => {
    if (e.target === lightbox) closeLightbox();
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowLeft')   navigate(-1);
    if (e.key === 'ArrowRight')  navigate(1);
  });

  // Focus trap
  lightbox.addEventListener('keydown', e => {
    if (e.key !== 'Tab') return;
    const focusable = [...lightbox.querySelectorAll('button, [tabindex]:not([tabindex="-1"])')];
    const first = focusable[0];
    const last  = focusable[focusable.length - 1];
    if (e.shiftKey ? document.activeElement === first : document.activeElement === last) {
      e.preventDefault();
      (e.shiftKey ? last : first).focus();
    }
  });
  </script>

  <style>
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* Text-only minimal hero */
    .gallery-hero {
      background: var(--color-bg-dark);
      padding: var(--space-16) var(--space-8) var(--space-12);
      text-align: center;
    }

    .gallery-hero__title {
      font-family: var(--font-heading);
      font-size: var(--text-4xl);
      color: var(--color-text-inverse);
      letter-spacing: var(--tracking-wide);
      margin-bottom: var(--space-4);
    }

    .gallery-hero__subtitle {
      font-family: var(--font-body);
      font-size: var(--text-xl);
      color: var(--color-gold-light);
      font-weight: 300;
      letter-spacing: var(--tracking-wider);
      margin-bottom: var(--space-6);
      max-width: none;
    }

    /* Gallery item buttons */
    .gallery-item__btn {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      position: relative;
      overflow: hidden;
    }

    .gallery-item__btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform var(--transition-smooth);
    }

    .gallery-item__btn:hover img,
    .gallery-item__btn:focus img {
      transform: scale(1.04);
    }

    .gallery-item__btn:focus-visible {
      outline: 3px solid var(--color-gold);
      outline-offset: -3px;
    }

    /* Placeholder for missing images */
    .gallery-item__btn img[src=""] {
      background: var(--color-bg-secondary);
      min-height: 200px;
    }

    .gallery-empty {
      text-align: center;
      padding: var(--space-16);
      color: var(--color-text-muted);
      font-style: italic;
    }
  </style>
</body>

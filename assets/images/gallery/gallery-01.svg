<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#2A1A0A"/>
      <stop offset="100%" stop-color="#0E0804"/>
    </linearGradient>
    <linearGradient id="bowl-grad" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#3D2E1E"/>
      <stop offset="100%" stop-color="#1A1208"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Bowl silhouette — traditional Edo tea bowl -->
  <ellipse cx="300" cy="280" rx="200" ry="30" fill="#2A1A0A" stroke="#4A3520" stroke-width="2" opacity="0.8"/>
  <path d="M 100 280 C 80 380 100 520 300 570 C 500 520 520 380 500 280"
        fill="url(#bowl-grad)" stroke="#4A3520" stroke-width="2"/>
  <!-- Bowl rim inner ellipse -->
  <ellipse cx="300" cy="280" rx="185" ry="25" fill="none" stroke="#3A2818" stroke-width="1.5" opacity="0.6"/>
  <!-- Interior of bowl (darker) -->
  <path d="M 115 290 C 100 380 120 510 300 555 C 480 510 500 380 485 290"
        fill="#1A1008" opacity="0.5"/>
  <!-- Gold seam — primary crack, runs diagonally across -->
  <g fill="none" stroke="#C9932A" stroke-linecap="round">
    <path d="M 140 310 L 180 360 L 160 420 L 220 480 L 200 535"
          stroke-width="3" opacity="0.9"/>
    <path d="M 180 360 L 230 350 L 270 330" stroke-width="1.5" opacity="0.6"/>
    <path d="M 160 420 L 110 440 L 90 460" stroke-width="1.5" opacity="0.5"/>
    <!-- Secondary crack -->
    <path d="M 380 295 L 410 360 L 390 430 L 440 500"
          stroke-width="2" opacity="0.75"/>
    <path d="M 410 360 L 460 345" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Gold dots at crack nodes -->
  <g fill="#C9932A">
    <circle cx="180" cy="360" r="3.5" opacity="0.95"/>
    <circle cx="160" cy="420" r="3" opacity="0.9"/>
    <circle cx="220" cy="480" r="3.5" opacity="0.95"/>
    <circle cx="410" cy="360" r="3" opacity="0.9"/>
    <circle cx="390" cy="430" r="3" opacity="0.85"/>
  </g>
  <!-- Gold shimmer on bowl surface -->
  <ellipse cx="300" cy="400" rx="160" ry="80" fill="#C9932A" opacity="0.025"/>
  <!-- Category label bar -->
  <rect x="0" y="740" width="600" height="60" fill="#0D0804" opacity="0.85"/>
  <line x1="40" y1="750" x2="560" y2="750" stroke="#C9932A" stroke-width="1" opacity="0.4"/>
  <text x="300" y="778" text-anchor="middle" font-family="Georgia,serif" font-size="13"
        fill="#C9932A" opacity="0.7" letter-spacing="4">TRADITIONAL</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1E1408"/>
      <stop offset="100%" stop-color="#0C0804"/>
    </linearGradient>
    <linearGradient id="bowl-grad" x1="20%" y1="10%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#3A2010"/>
      <stop offset="50%" stop-color="#281808"/>
      <stop offset="100%" stop-color="#140C04"/>
    </linearGradient>
    <radialGradient id="subtle-glow" cx="45%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#C9932A" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C9932A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Kyoto tea bowl — traditional Hon-Kintsugi, the finest example -->
  <!-- Subtle glow behind the bowl -->
  <rect width="600" height="800" fill="url(#subtle-glow)"/>
  <!-- Tea bowl silhouette — wider, shorter (chawan style) -->
  <ellipse cx="300" cy="285" rx="225" ry="38" fill="#2A1A08" stroke="#5A4030" stroke-width="2.5" opacity="0.85"/>
  <path d="M 75 285 C 55 390 80 545 300 598 C 520 545 545 390 525 285"
        fill="url(#bowl-grad)" stroke="#5A4030" stroke-width="2.5"/>
  <ellipse cx="300" cy="285" rx="210" ry="34" fill="none" stroke="#4A3520" stroke-width="2" opacity="0.6"/>
  <!-- Interior of bowl -->
  <path d="M 90 302 C 74 400 96 534 300 582 C 504 534 526 400 510 302"
        fill="#180E06" opacity="0.55"/>
  <!-- Small foot ring at bottom -->
  <ellipse cx="300" cy="595" rx="80" ry="12" fill="none" stroke="#4A3520" stroke-width="2" opacity="0.5"/>
  <!-- Hon-Kintsugi seams — precise, refined, beautiful -->
  <g fill="none" stroke="#C9932A" stroke-linecap="round">
    <!-- First seam — the primary break repair, running from rim to base -->
    <path d="M 175 300 L 200 375 L 182 455 L 210 530 L 196 582"
          stroke-width="3" opacity="0.95"/>
    <!-- Glow -->
    <path d="M 175 300 L 200 375 L 182 455 L 210 530 L 196 582"
          stroke="#FFE580" stroke-width="6" opacity="0.15"/>
    <!-- Branch from first seam -->
    <path d="M 200 375 L 155 362 L 120 350" stroke-width="1.5" opacity="0.7"/>
    <path d="M 182 455 L 137 462 L 105 466" stroke-width="1.5" opacity="0.65"/>
    <!-- Second seam — another repair, shorter, elegant -->
    <path d="M 390 295 L 415 370 L 398 455 L 420 530"
          stroke-width="2.5" opacity="0.9"/>
    <path d="M 390 295 L 415 370 L 398 455 L 420 530"
          stroke="#FFE580" stroke-width="5" opacity="0.12"/>
    <path d="M 415 370 L 460 355 L 498 342" stroke-width="1.5" opacity="0.65"/>
    <path d="M 398 455 L 448 442 L 490 432" stroke-width="1.5" opacity="0.6"/>
    <!-- Hairline connecting the two main seams — where the bowl pieces meet -->
    <path d="M 200 375 L 270 365 L 350 370 L 415 370"
          stroke-width="1.5" opacity="0.8"/>
    <path d="M 200 375 L 270 365 L 350 370 L 415 370"
          stroke="#FFE580" stroke-width="3" opacity="0.1"/>
    <path d="M 182 455 L 270 446 L 350 450 L 398 455"
          stroke-width="1.5" opacity="0.75"/>
  </g>
  <!-- Gold nodes — Hon-Kintsugi quality, bright and refined -->
  <g fill="#C9932A">
    <circle cx="200" cy="375" r="5" opacity="1"/>
    <circle cx="182" cy="455" r="5" opacity="1"/>
    <circle cx="210" cy="530" r="5" opacity="1"/>
    <circle cx="415" cy="370" r="4.5" opacity="0.97"/>
    <circle cx="398" cy="455" r="4.5" opacity="0.97"/>
    <circle cx="420" cy="530" r="4.5" opacity="0.95"/>
    <circle cx="270" cy="365" r="3.5" opacity="0.92"/>
    <circle cx="350" cy="370" r="3.5" opacity="0.92"/>
    <circle cx="270" cy="446" r="3" opacity="0.88"/>
    <circle cx="350" cy="450" r="3" opacity="0.88"/>
  </g>
  <!-- Highlight dots (light catching gold) -->
  <g fill="#FFE580" opacity="0.6">
    <circle cx="200" cy="374" r="2" opacity="0.5"/>
    <circle cx="415" cy="369" r="1.5" opacity="0.45"/>
    <circle cx="210" cy="529" r="1.5" opacity="0.45"/>
  </g>
  <text x="300" y="650" text-anchor="middle" font-family="Georgia,serif" font-size="11"
        fill="#C9932A" opacity="0.3" letter-spacing="3" font-style="italic">京都 · Kyoto</text>
  <rect x="0" y="740" width="600" height="60" fill="#0C0804" opacity="0.85"/>
  <line x1="40" y1="750" x2="560" y2="750" stroke="#C9932A" stroke-width="1" opacity="0.4"/>
  <text x="300" y="778" text-anchor="middle" font-family="Georgia,serif" font-size="13"
        fill="#C9932A" opacity="0.7" letter-spacing="4">TRADITIONAL</text>
</svg>

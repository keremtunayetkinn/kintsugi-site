<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1208"/>
      <stop offset="100%" stop-color="#0A0603"/>
    </linearGradient>
    <radialGradient id="face-grad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#8B6040"/>
      <stop offset="100%" stop-color="#5A3820"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#C9932A" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C9932A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#glow)"/>
  <!-- Simplified portrait silhouette — artist at work -->
  <!-- Head -->
  <ellipse cx="220" cy="120" rx="55" ry="62" fill="url(#face-grad)"/>
  <!-- Hair -->
  <path d="M 165 110 C 165 70 178 55 220 52 C 262 55 275 70 275 110 C 275 90 270 70 250 65 C 248 58 236 53 220 52 C 204 53 192 58 190 65 C 170 70 165 90 165 110 Z"
        fill="#201008"/>
  <!-- Body/torso -->
  <path d="M 155 175 C 140 200 135 250 138 310 L 305 310 C 308 250 303 200 285 175 C 265 168 240 165 220 165 C 200 165 175 168 155 175 Z"
        fill="#2A1A10"/>
  <!-- Kimono collar detail -->
  <path d="M 220 165 L 200 200 L 220 195 L 240 200 Z" fill="#3A2818" opacity="0.6"/>
  <!-- Artist's hands working on a bowl -->
  <!-- Left arm -->
  <path d="M 150 240 C 130 255 120 270 115 285 L 145 300 C 148 285 155 272 168 262 Z"
        fill="url(#face-grad)"/>
  <!-- Right arm -->
  <path d="M 290 240 C 310 255 320 270 325 285 L 295 300 C 292 285 285 272 272 262 Z"
        fill="url(#face-grad)"/>
  <!-- Bowl being worked on -->
  <ellipse cx="220" cy="310" rx="100" ry="18" fill="#2E1E10" stroke="#4A3520" stroke-width="1.5"/>
  <path d="M 120 310 C 112 340 120 370 220 385 C 320 370 328 340 320 310"
        fill="#2E1E10" stroke="#4A3520" stroke-width="1.5"/>
  <!-- Gold seam being applied (in progress) -->
  <g fill="none" stroke="#C9932A" stroke-linecap="round">
    <path d="M 155 325 L 175 342 L 162 360 L 188 375"
          stroke-width="2.5" opacity="0.9"/>
    <path d="M 175 342 L 205 336" stroke-width="1.5" opacity="0.6"/>
    <path d="M 162 360 L 138 365" stroke-width="1.5" opacity="0.55"/>
  </g>
  <g fill="#C9932A">
    <circle cx="175" cy="342" r="3" opacity="0.95"/>
    <circle cx="162" cy="360" r="3" opacity="0.9"/>
    <circle cx="188" cy="375" r="3" opacity="0.9"/>
  </g>
  <!-- Brush in right hand (suggestive line) -->
  <line x1="310" y1="265" x2="265" y2="310" stroke="#4A3020" stroke-width="3"/>
  <line x1="310" y1="265" x2="265" y2="310" stroke="#6A5040" stroke-width="1" opacity="0.5"/>
  <!-- Brush tip with gold -->
  <circle cx="265" cy="310" r="3" fill="#C9932A" opacity="0.85"/>
  <!-- Right side: kanji + text info -->
  <line x1="370" y1="40" x2="370" y2="360" stroke="#C9932A" stroke-width="1" opacity="0.2"/>
  <!-- Kanji: 匠 -->
  <text x="490" y="130" text-anchor="middle" font-family="Georgia,serif" font-size="80"
        fill="#C9932A" opacity="0.15">匠</text>
  <!-- Artist name area -->
  <line x1="390" y1="160" x2="580" y2="160" stroke="#C9932A" stroke-width="1" opacity="0.35"/>
  <text x="485" y="188" text-anchor="middle" font-family="Georgia,serif" font-size="16"
        fill="#C9932A" opacity="0.65" letter-spacing="2">YUSUKE SUGINAKA</text>
  <text x="485" y="210" text-anchor="middle" font-family="Georgia,serif" font-size="12"
        fill="#C9932A" opacity="0.45" letter-spacing="1" font-style="italic">金継ぎ職人</text>
  <line x1="390" y1="225" x2="580" y2="225" stroke="#C9932A" stroke-width="1" opacity="0.25"/>
  <text x="485" y="248" text-anchor="middle" font-family="Georgia,serif" font-size="11"
        fill="#C9932A" opacity="0.4" letter-spacing="1">Kyoto, Japan</text>
  <text x="485" y="268" text-anchor="middle" font-family="Georgia,serif" font-size="11"
        fill="#C9932A" opacity="0.35" letter-spacing="1">Traditional Hon-Kintsugi</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#2C1A0E"/>
      <stop offset="60%" stop-color="#1A0F08"/>
      <stop offset="100%" stop-color="#0D0704"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9932A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C9932A" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <!-- Ambient glow -->
  <ellipse cx="800" cy="450" rx="500" ry="350" fill="#C9932A" opacity="0.04"/>
  <!-- Large kanji: 金継ぎ -->
  <text x="800" y="620" text-anchor="middle" font-family="Georgia,serif" font-size="480"
        fill="#C9932A" opacity="0.06" letter-spacing="-20">金</text>
  <!-- Gold crack paths — organic fracture lines -->
  <g fill="none" stroke="#C9932A" stroke-linecap="round">
    <path d="M 520 180 L 580 260 L 540 340 L 620 420 L 580 520 L 650 620 L 610 720"
          stroke-width="2.5" opacity="0.7"/>
    <path d="M 580 260 L 650 280 L 720 320"
          stroke-width="1.5" opacity="0.5"/>
    <path d="M 540 340 L 480 380 L 460 460"
          stroke-width="1.5" opacity="0.4"/>
    <path d="M 960 140 L 1000 220 L 960 310 L 1040 400 L 990 500 L 1060 600 L 1020 720"
          stroke-width="2.5" opacity="0.6"/>
    <path d="M 1000 220 L 1080 250 L 1140 300"
          stroke-width="1.5" opacity="0.4"/>
    <path d="M 1040 400 L 1100 420 L 1160 460"
          stroke-width="1.5" opacity="0.35"/>
    <path d="M 300 400 L 400 380 L 500 420 L 600 390 L 700 430 L 820 410 L 940 440 L 1060 400 L 1180 430 L 1280 400"
          stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Gold dust dots -->
  <g fill="#C9932A">
    <circle cx="582" cy="261" r="3" opacity="0.8"/>
    <circle cx="621" cy="421" r="2.5" opacity="0.7"/>
    <circle cx="580" cy="521" r="2" opacity="0.6"/>
    <circle cx="1001" cy="221" r="3" opacity="0.8"/>
    <circle cx="1041" cy="401" r="2.5" opacity="0.7"/>
  </g>
  <!-- Subtitle line -->
  <line x1="660" y1="810" x2="940" y2="810" stroke="#C9932A" stroke-width="1" opacity="0.4"/>
  <text x="800" y="840" text-anchor="middle" font-family="Georgia,serif" font-size="18"
        fill="#C9932A" opacity="0.55" letter-spacing="8">金継ぎ · KINTSUGI</text>
</svg>

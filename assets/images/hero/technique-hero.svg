<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#221408"/>
      <stop offset="100%" stop-color="#0A0603"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="500" rx="420" ry="300" fill="#C9932A" opacity="0.04"/>
  <!-- Large kanji: 技 (technique/skill) -->
  <text x="800" y="630" text-anchor="middle" font-family="Georgia,serif" font-size="490"
        fill="#C9932A" opacity="0.058">技</text>
  <!-- Step-by-step process cracks — layered, controlled -->
  <g fill="none" stroke="#C9932A" stroke-linecap="round">
    <!-- Bowl outline (abstract) -->
    <path d="M 380 280 C 340 380 360 560 560 620 C 760 680 860 680 1040 620 C 1220 560 1260 380 1220 280"
          stroke-width="2" opacity="0.2" fill="none"/>
    <!-- Primary repair seam — goes across the bowl -->
    <path d="M 420 380 L 460 420 L 440 480 L 500 530 L 480 590 L 540 630"
          stroke-width="3" opacity="0.75"/>
    <path d="M 460 420 L 510 400 L 560 380"
          stroke-width="1.5" opacity="0.5"/>
    <path d="M 440 480 L 390 500 L 360 530"
          stroke-width="1.5" opacity="0.45"/>
    <!-- Secondary seam -->
    <path d="M 760 360 L 800 410 L 780 470 L 840 530 L 810 590"
          stroke-width="2.5" opacity="0.65"/>
    <path d="M 800 410 L 860 400 L 920 380"
          stroke-width="1.5" opacity="0.45"/>
    <!-- Tertiary seam -->
    <path d="M 1060 380 L 1100 440 L 1080 500 L 1120 560"
          stroke-width="2" opacity="0.55"/>
    <path d="M 1100 440 L 1160 430"
          stroke-width="1" opacity="0.35"/>
    <!-- Step markers — small horizontal dashes -->
    <line x1="360" y1="280" x2="400" y2="280" stroke-width="1.5" opacity="0.4"/>
    <line x1="360" y1="380" x2="400" y2="380" stroke-width="1.5" opacity="0.4"/>
    <line x1="360" y1="480" x2="400" y2="480" stroke-width="1.5" opacity="0.4"/>
    <line x1="360" y1="580" x2="400" y2="580" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Gold dust dots at intersections -->
  <g fill="#C9932A">
    <circle cx="460" cy="420" r="3.5" opacity="0.85"/>
    <circle cx="440" cy="480" r="3" opacity="0.8"/>
    <circle cx="500" cy="530" r="3.5" opacity="0.85"/>
    <circle cx="800" cy="410" r="3.5" opacity="0.85"/>
    <circle cx="780" cy="470" r="3" opacity="0.8"/>
    <circle cx="840" cy="530" r="3.5" opacity="0.85"/>
    <circle cx="1100" cy="440" r="3" opacity="0.8"/>
  </g>
  <line x1="640" y1="820" x2="960" y2="820" stroke="#C9932A" stroke-width="1" opacity="0.35"/>
  <text x="800" y="850" text-anchor="middle" font-family="Georgia,serif" font-size="18"
        fill="#C9932A" opacity="0.5" letter-spacing="8">技法 · TECHNIQUE</text>
</svg>
